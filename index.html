<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Centro de Organização IA</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #38bdf8;
      --danger: #f87171;
      --border: #334155;
      font-family: Inter, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .page { max-width: 1100px; margin: 0 auto; padding: 16px; display: grid; gap: 14px; }
    .section { border: 1px solid var(--border); border-radius: 10px; background: var(--card); padding: 12px; }
    .section h2 { margin: 0 0 10px; font-size: 16px; color: var(--accent); }
    .row { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea, button { width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 8px; background: #0b1220; color: var(--text); }
    button { cursor: pointer; background: var(--accent); color: #04101a; font-weight: 700; border: none; }
    button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .index-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .index-buttons button { width: auto; }
    .created-sections { display: grid; gap: 12px; }
    .remove-btn { width: auto; background: var(--danger); color: white; margin-top: 8px; }

    .tracker-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .tracker-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: #162033; }
    .tracker-card h4 { margin: 0 0 8px; color: var(--accent); }

    .timeline-pool, .timeline-lane { min-height: 54px; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .task-chip { padding: 8px 10px; border-radius: 999px; background: #0b1220; border: 1px solid var(--border); cursor: grab; user-select: none; }
    .timeline-lane { align-items: center; }

    .chat-box { max-height: 280px; overflow: auto; display: grid; gap: 8px; margin-bottom: 10px; }
    .msg { padding: 8px; border-radius: 8px; background: #0b1220; border: 1px solid var(--border); }
    .msg strong { color: var(--accent); }
    .helper { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="page">
    <section class="section" id="sec-data-dia">
      <h2>📅 Data e Dia da Semana</h2>
      <div class="row">
        <div>
          <label for="date">Data</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label for="weekday">Dia da semana</label>
          <select id="weekday">
            <option value="">Selecione...</option>
            <option>Segunda-feira</option>
            <option>Terça-feira</option>
            <option>Quarta-feira</option>
            <option>Quinta-feira</option>
            <option>Sexta-feira</option>
            <option>Sábado</option>
            <option>Domingo</option>
          </select>
        </div>
      </div>
    </section>

    <section class="section" id="sec-indice">
      <h2>🧩 Criador de Seções</h2>
      <p class="helper">Clique em um título para criar a seção correspondente. Você pode apagar qualquer seção criada.</p>
      <div class="index-buttons" id="index-buttons"></div>
    </section>

    <section class="section" id="sec-ia-chat">
      <h2>🤖 Chat com IA</h2>
      <div class="chat-box" id="chat-box">
        <div class="msg"><strong>Sistema:</strong> Seção fixa de IA (janela flutuante removida).</div>
      </div>
      <div class="row">
        <div style="grid-column: 1 / -1;">
          <label for="user-prompt">Pergunta</label>
          <textarea id="user-prompt" rows="3" placeholder="Digite sua pergunta para IA..."></textarea>
        </div>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btn-send-ia">Enviar para IA</button>
      </div>
    </section>

    <section class="section" id="sec-ia-notes">
      <h2>🧠 Bloco IA (Notas e Prompts)</h2>
      <label for="ia-notes">Notas de prompts</label>
      <textarea id="ia-notes" rows="5" placeholder="Guarde seus prompts, respostas resumidas e ideias de IA."></textarea>
    </section>

    <div id="created-sections" class="created-sections"></div>
  </main>

  <template id="tpl-prioridades">
    <section class="section created" data-template="prioridades">
      <h2>✅ Prioridades do Dia</h2>
      <div id="prioridades-lista"></div>
      <button class="ghost add-prio">+ prioridade</button>
      <button class="remove-btn">Apagar seção</button>
    </section>
  </template>

  <template id="tpl-projetos">
    <section class="section created" data-template="projetos">
      <h2>📁 Projetos (sem campo de porcentagem)</h2>
      <div class="helper">Cada linha descreve projeto e próximo passo.</div>
      <div id="projetos-lista"></div>
      <button class="ghost add-projeto">+ projeto</button>
      <button class="remove-btn">Apagar seção</button>
    </section>
  </template>

  <template id="tpl-trackers">
    <section class="section created" data-template="trackers">
      <h2>📌 Trackers pessoais (reorganizados)</h2>
      <div class="tracker-grid">
        <article class="tracker-card">
          <h4>Energia</h4>
          <label>Nível (1-10)</label>
          <input type="number" min="1" max="10" />
        </article>
        <article class="tracker-card">
          <h4>Humor</h4>
          <label>Como estou?</label>
          <input type="text" placeholder="Ex: focada, cansada..." />
        </article>
        <article class="tracker-card">
          <h4>Hábitos</h4>
          <label><input type="checkbox" /> Água</label>
          <label><input type="checkbox" /> Exercício</label>
          <label><input type="checkbox" /> Leitura</label>
        </article>
        <article class="tracker-card">
          <h4>Observações</h4>
          <textarea rows="3" placeholder="Notas rápidas"></textarea>
        </article>
      </div>
      <button class="remove-btn">Apagar seção</button>
    </section>
  </template>

  <template id="tpl-linha-tempo">
    <section class="section created" data-template="linha-tempo">
      <h2>🧱 Blocos de Tarefas em Linha do Tempo</h2>
      <p class="helper">Crie blocos e arraste para organizar a sequência (sem marcação de horário real).</p>
      <div class="row">
        <div>
          <label>Nova tarefa</label>
          <input type="text" class="new-task-input" placeholder="Ex: revisar briefing" />
        </div>
        <div style="align-self:end;">
          <button class="add-task">+ criar bloco</button>
        </div>
      </div>
      <h4>Pilha de tarefas</h4>
      <div class="timeline-pool" data-dropzone="pool"></div>
      <h4>Linha do tempo (sequência)</h4>
      <div class="timeline-lane" data-dropzone="lane"></div>
      <button class="remove-btn">Apagar seção</button>
    </section>
  </template>

  <script>
    const sectionTemplates = {
      "Prioridades": "tpl-prioridades",
      "Projetos": "tpl-projetos",
      "Trackers Pessoais": "tpl-trackers",
      "Linha do Tempo de Tarefas": "tpl-linha-tempo"
    };

    const createdSections = document.getElementById('created-sections');
    const indexButtons = document.getElementById('index-buttons');

    Object.entries(sectionTemplates).forEach(([label, tplId]) => {
      const btn = document.createElement('button');
      btn.className = 'ghost';
      btn.textContent = label;
      btn.addEventListener('click', () => createSection(tplId));
      indexButtons.appendChild(btn);
    });

    function createSection(templateId) {
      const template = document.getElementById(templateId);
      const node = template.content.firstElementChild.cloneNode(true);
      wireSection(node);
      createdSections.appendChild(node);
      if (templateId === 'tpl-prioridades') addPrioridadeRow(node.querySelector('#prioridades-lista'));
      if (templateId === 'tpl-projetos') addProjetoRow(node.querySelector('#projetos-lista'));
    }

    function wireSection(sectionNode) {
      sectionNode.querySelector('.remove-btn')?.addEventListener('click', () => sectionNode.remove());

      sectionNode.querySelector('.add-prio')?.addEventListener('click', () => {
        addPrioridadeRow(sectionNode.querySelector('#prioridades-lista'));
      });

      sectionNode.querySelector('.add-projeto')?.addEventListener('click', () => {
        addProjetoRow(sectionNode.querySelector('#projetos-lista'));
      });

      const addTaskBtn = sectionNode.querySelector('.add-task');
      if (addTaskBtn) {
        const input = sectionNode.querySelector('.new-task-input');
        const pool = sectionNode.querySelector('[data-dropzone="pool"]');
        const lane = sectionNode.querySelector('[data-dropzone="lane"]');
        addTaskBtn.addEventListener('click', () => {
          const text = input.value.trim();
          if (!text) return;
          pool.appendChild(makeTaskChip(text));
          input.value = '';
        });
        [pool, lane].forEach(zone => {
          zone.addEventListener('dragover', e => e.preventDefault());
          zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const task = sectionNode.querySelector(`[data-task-id="${id}"]`);
            if (task) zone.appendChild(task);
          });
        });
      }
    }

    function addPrioridadeRow(container) {
      const row = document.createElement('div');
      row.className = 'row';
      row.style.marginTop = '8px';
      row.innerHTML = `<input type="text" placeholder="Prioridade" /><button class="remove-btn" style="margin:0;">✕</button>`;
      row.querySelector('button').addEventListener('click', () => row.remove());
      container.appendChild(row);
    }

    function addProjetoRow(container) {
      const row = document.createElement('div');
      row.className = 'row';
      row.style.marginTop = '8px';
      row.innerHTML = `
        <input type="text" placeholder="Nome do projeto" />
        <input type="text" placeholder="Próxima ação" />
        <button class="remove-btn" style="margin:0;">✕</button>
      `;
      row.querySelector('button').addEventListener('click', () => row.remove());
      container.appendChild(row);
    }

    function makeTaskChip(text) {
      const chip = document.createElement('div');
      chip.className = 'task-chip';
      chip.textContent = text;
      chip.draggable = true;
      chip.dataset.taskId = crypto.randomUUID();
      chip.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', chip.dataset.taskId);
      });
      return chip;
    }

    document.getElementById('btn-send-ia').addEventListener('click', async () => {
      const promptEl = document.getElementById('user-prompt');
      const text = promptEl.value.trim();
      if (!text) return;
      const box = document.getElementById('chat-box');
      const userMsg = document.createElement('div');
      userMsg.className = 'msg';
      userMsg.innerHTML = `<strong>Você:</strong> ${text}`;
      box.appendChild(userMsg);
      promptEl.value = '';

      const iaMsg = document.createElement('div');
      iaMsg.className = 'msg';
      iaMsg.innerHTML = '<strong>IA:</strong> respondendo...';
      box.appendChild(iaMsg);
      box.scrollTop = box.scrollHeight;

      try {
        const res = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });
        const data = await res.json();
        iaMsg.innerHTML = `<strong>IA:</strong> ${data.text || 'Sem resposta.'}`;
      } catch {
        iaMsg.innerHTML = '<strong>IA:</strong> Falha ao conectar com a API.';
      }
      box.scrollTop = box.scrollHeight;
    });
  </script>
</body>
</html>
